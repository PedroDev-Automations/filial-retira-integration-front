<div class="container mt-2 animate__animated animate__fadeIn">
  <h3 class="text-secondary mb-4">📊 Visão Geral do Sistema</h3>

  <div class="alert alert-info shadow-sm" *ngIf="mensagem">
    {{ mensagem }}
  </div>

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card shadow-sm border-0 border-start border-primary border-5 rounded-3">
        <div class="card-body">
          <h6 class="text-muted text-uppercase mb-2">Filiais Ativas</h6>
          <h2 class="mb-0 text-primary fw-bold">{{ totalFiliais }}</h2>
        </div>
      </div>
    </div>
  </div>

  <h4 class="text-secondary mb-3 mt-5">⚡ Ações Manuais do Robô</h4>
  <div class="row">
    
    <div class="col-md-4 mb-3">
      <div class="card shadow-sm border-0 rounded-4 h-100">
        <div class="card-body text-center p-4">
          <i class="bi bi-cart-check text-primary mb-3" style="font-size: 2.5rem;"></i>
          <h5 class="mt-2">Buscar Pedidos</h5>
          <p class="text-muted small">Força o robô a procurar novos pedidos agora.</p>
          <button class="btn btn-primary w-100 mt-auto shadow-sm" (click)="varrerPedidos()" [disabled]="carregandoPedidos">
            <span *ngIf="!carregandoPedidos">🔍 Iniciar Busca</span>
            <span *ngIf="carregandoPedidos" class="spinner-border spinner-border-sm"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm border-0 rounded-4 h-100">
        <div class="card-body text-center p-4">
          <i class="bi bi-lightning-charge text-warning mb-3" style="font-size: 2.5rem;"></i>
          <h5 class="mt-2">Estoque Rápido</h5>
          <p class="text-muted small">Atualiza apenas os produtos alterados recentemente.</p>
          <button class="btn btn-warning text-dark fw-bold w-100 mt-auto shadow-sm" (click)="sincronizarEstoqueIncremental()" [disabled]="carregandoEstoqueIncremental">
            <span *ngIf="!carregandoEstoqueIncremental">⚡ Sincronizar Rápido</span>
            <span *ngIf="carregandoEstoqueIncremental" class="spinner-border spinner-border-sm"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm border-0 rounded-4 h-100">
        <div class="card-body text-center p-4">
          <i class="bi bi-boxes text-success mb-3" style="font-size: 2.5rem;"></i>
          <h5 class="mt-2">Carga Completa</h5>
          <p class="text-muted small">Varredura profunda de todo o catálogo (Demorado).</p>
          <button class="btn btn-success w-100 mt-auto shadow-sm" (click)="sincronizarEstoque()" [disabled]="carregandoEstoque">
            <span *ngIf="!carregandoEstoque">📦 Iniciar Carga Total</span>
            <span *ngIf="carregandoEstoque" class="spinner-border spinner-border-sm"></span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
